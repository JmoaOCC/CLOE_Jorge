<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLOE_COACH</title>
<style>
body{font-family:Arial,sans-serif;background:#0b1020;color:#fff;max-width:1100px;margin:auto;padding:20px}
.card{background:#131b2e;padding:20px;border-radius:16px;margin:14px 0}
button{padding:10px 14px;border:none;border-radius:10px;background:#fb923c;font-weight:bold}
input,textarea{width:100%;padding:10px;margin-top:8px;background:#1a2438;color:white;border:1px solid #2d3a50;border-radius:10px}
.hidden{display:none}
</style>
</head>
<body>
<div id="login">
<h1>C.L.O.E COACH</h1>
<div class="card">
<h2>Login demo</h2>
<input id="u" value="jorge">
<input id="p" type="password" value="cloe2026">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" class="hidden">
<h1>C.L.O.E COACH</h1>
<button onclick="saveLocal()">Guardar local</button>
<button onclick="saveRepo()">Save Repo</button>
<button onclick="pullRepo()">Pull</button>

<div class="card">
<h2>Entreno</h2>
<input id="bench" placeholder="Press banca">
<textarea id="notes" placeholder="Observaciones"></textarea>
</div>

<div class="card">
<h2>Nutrición</h2>
<select id="meal">
<option>Pollo + arroz</option>
<option>Ternera + patata</option>
</select>
</div>

<div class="card">
<h2>Check-in 14 días</h2>
<input id="peso" placeholder="Peso">
<input id="cintura" placeholder="Cintura">
</div>
</div>

<script>
const AUTH_USER='jorge';
const AUTH_PASS='cloe2026';
let db=JSON.parse(localStorage.getItem('cloe_coach')||'{}');

function login(){
if(u.value===AUTH_USER && p.value===AUTH_PASS){
loginDiv=document.getElementById('login');
app=document.getElementById('app');
loginDiv.classList.add('hidden');
app.classList.remove('hidden');
loadFields();
}else alert('Credenciales incorrectas');
}

function saveLocal(){
db={
 bench:bench.value,
 notes:notes.value,
 meal:meal.value,
 peso:peso.value,
 cintura:cintura.value
};
localStorage.setItem('cloe_coach',JSON.stringify(db));
alert('Guardado local');
}

function loadFields(){
if(!db)return;
bench.value=db.bench||'';
notes.value=db.notes||'';
meal.value=db.meal||meal.value;
peso.value=db.peso||'';
cintura.value=db.cintura||'';
}

/* Configura esto */
const OWNER='TUUSUARIO';
const REPO='CLOE_COACH';
const TOKEN='PON_AQUI_TOKEN';

async function saveRepo(){
saveLocal();
alert('Demo preparada. Configura GitHub token en index.html según README.');
}

async function pullRepo(){
alert('Demo preparada. Configura GitHub sync según README.');
}
</script>
</body>
</html>
